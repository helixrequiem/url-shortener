<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>URL Shortener</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 520px;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #f8fafc;
    }

    p.subtitle {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #94a3b8;
      margin-bottom: 6px;
    }

    input[type="url"] {
      width: 100%;
      padding: 12px 16px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #f1f5f9;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 16px;
    }

    input[type="url"]:focus {
      border-color: #6366f1;
    }

    button {
      width: 100%;
      padding: 13px;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover  { background: #4f46e5; }
    button:disabled { background: #3730a3; cursor: not-allowed; }

    .result {
      margin-top: 24px;
      padding: 16px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      display: none;
    }

    .result.show { display: block; }

    .result-label {
      font-size: 12px;
      color: #64748b;
      margin-bottom: 6px;
    }

    .result-url {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .result-url a {
      color: #818cf8;
      font-size: 15px;
      word-break: break-all;
      text-decoration: none;
      flex: 1;
    }

    .result-url a:hover { text-decoration: underline; }

    .copy-btn {
      width: auto;
      padding: 6px 14px;
      font-size: 13px;
      background: #334155;
      border-radius: 6px;
      flex-shrink: 0;
    }

    .copy-btn:hover { background: #475569; }

    .error {
      margin-top: 16px;
      padding: 12px 16px;
      background: #450a0a;
      border: 1px solid #dc2626;
      border-radius: 8px;
      color: #fca5a5;
      font-size: 14px;
      display: none;
    }

    .error.show { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <h1>✂️ URL Shortener</h1>
    <p class="subtitle">Paste a long URL and get a short link instantly.</p>

    <label for="urlInput">Long URL</label>
    <input
      type="url"
      id="urlInput"
      placeholder="https://example.com/very/long/url"
    />

    <button id="shortenBtn" onclick="shortenUrl()">Shorten URL</button>

    <div class="result" id="result">
      <div class="result-label">Your short URL</div>
      <div class="result-url">
        <a id="shortLink" href="#" target="_blank"></a>
        <button class="copy-btn" onclick="copyUrl()">Copy</button>
      </div>
    </div>

    <div class="error" id="error"></div>
  </div>

  <script>
    // Replace this with your actual API Gateway URL from Terraform output
    const API_URL = "https://xrhk2xflce.execute-api.ap-south-1.amazonaws.com";

    async function shortenUrl() {
      const input = document.getElementById("urlInput");
      const btn = document.getElementById("shortenBtn");
      const result = document.getElementById("result");
      const error = document.getElementById("error");
      const shortLink = document.getElementById("shortLink");

      const originalUrl = input.value.trim();

      // Hide previous results
      result.classList.remove("show");
      error.classList.remove("show");

      if (!originalUrl.startsWith("http")) {
        showError("Please enter a valid URL starting with http:// or https://");
        return;
      }

      btn.disabled = true;
      btn.textContent = "Shortening...";

      try {
        const res = await fetch(`${API_URL}/shorten`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ originalUrl, userId: "anonymous" }),
        });

        const data = await res.json();

        if (!res.ok) throw new Error(data.error || "Something went wrong");

        // Show the API Gateway redirect URL directly (works without a custom domain)
        const redirectUrl = `${API_URL}/${data.shortId}`;
        shortLink.href = redirectUrl;
        shortLink.textContent = redirectUrl;
        result.classList.add("show");

      } catch (err) {
        showError(err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = "Shorten URL";
      }
    }

    function showError(msg) {
      const error = document.getElementById("error");
      error.textContent = msg;
      error.classList.add("show");
    }

    function copyUrl() {
      const url = document.getElementById("shortLink").textContent;
      navigator.clipboard.writeText(url).then(() => {
        const btn = document.querySelector(".copy-btn");
        btn.textContent = "Copied!";
        setTimeout(() => btn.textContent = "Copy", 2000);
      });
    }

    // Allow pressing Enter to submit
    document.getElementById("urlInput")
      .addEventListener("keydown", e => {
        if (e.key === "Enter") shortenUrl();
      });
  </script>
</body>
</html>
